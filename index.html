<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <section class="container">

        <div class="timer">

            <div class="num">
                <div id="h">0</div>
                <div>hours</div>
            </div>

            <div class="num">
                <div id="m">5</div>
                <div>minutes</div>
            </div>

            <div class="num">
                <div id="s">0</div>
                <div>second</div>
            </div>

        <div class="btns">
            <div class="top">
          <button onclick="play()" id="play"> start </button>
            <button class="hidden" id="reset">reset</button>
            </div>
           <div class="bottom">
              <button onclick="play()" id="play"> start </button>
            <button class="hidden" id="reset">reset</button>
           </div> 
  
        </div>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>
