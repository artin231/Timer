<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <section class="container">

        <div class="timer">
            <div class="top">
                <h3>timer normal</h3>
                <h1 id="time">0:5:00</h1>
                <div class="down">
                    <button onclick="play()" id="play"> start </button>
                    <button class="hidden" id="reset">reset</button>

                </div>
            </div>

            <div class="bottom">
                <p>changing time</p>
                <div class="down">
                    <button class="down_btn" id="1">1min</button>
                    <button class="down_btn" id="5">5min</button>
                    <button class="down_btn" id="10">10min</button>
                    <button class="down_btn" id="15">15min</button>
                    <button class="down_btn" id="30">30min</button>
                    <button class="down_btn" id="45">45min</button>
                </div>
            </div>
        </div>

    </section>

    <script src="js/script.js"></script>

</body>

</html>
